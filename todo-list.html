<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Ledger</title>
<style>
  :root {
    --paper: #f6f3ec;
    --ink: #2b2620;
    --ink-soft: #6b6355;
    --rule: #d8d1c0;
    --accent: #8a6d3b;
    --accent-strike: #a89f8c;
    --danger: #a4453a;
    --active-bg: #eee8d9;
    --due-soon: #8a6d3b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px);
    background-size: 100% 2.1em;
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Georgia', serif;
    display: flex;
    justify-content: center;
    padding: 4vh 1.5rem;
  }

  main {
    width: 100%;
    max-width: 560px;
  }

  header {
    margin-bottom: 1.5rem;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 0.75rem;
  }

  h1 {
    font-size: 1.9rem;
    margin: 0 0 0.15rem 0;
    letter-spacing: 0.01em;
    font-weight: 700;
  }

  .subtitle {
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  form#add-form {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 1.25rem 0;
  }

  #task-input {
    flex: 1;
    min-width: 140px;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--ink-soft);
    font-family: inherit;
    font-size: 1.05rem;
    padding: 0.4rem 0.1rem;
    color: var(--ink);
    outline: none;
  }

  #task-input:focus {
    border-bottom-color: var(--ink);
  }

  #task-input::placeholder {
    color: var(--ink-soft);
    font-style: italic;
  }

  #due-input {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--ink-soft);
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    padding: 0.4rem 0.1rem;
    color: var(--ink-soft);
    outline: none;
  }

  #due-input:focus {
    border-bottom-color: var(--ink);
    color: var(--ink);
  }

  button {
    font-family: 'Courier New', monospace;
    cursor: pointer;
  }

  #add-form button {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0 1.1rem;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  #add-form button:hover { background: var(--accent); }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
  }

  #counter {
    color: var(--ink-soft);
  }

  #counter strong {
    color: var(--ink);
  }

  .filters {
    display: flex;
    gap: 0.25rem;
    background: var(--active-bg);
    border: 1px solid var(--rule);
    padding: 2px;
  }

  .filter-btn {
    background: transparent;
    border: none;
    padding: 0.3rem 0.65rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
  }

  .filter-btn.selected {
    background: var(--ink);
    color: var(--paper);
  }

  ul#task-list {
    list-style: none;
    margin: 0;
    padding: 0;
    border-top: 1px solid var(--rule);
  }

  li.task {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 0.65rem 0.1rem;
    border-bottom: 1px solid var(--rule);
  }

  .check {
    width: 1.1rem;
    height: 1.1rem;
    border: 1.5px solid var(--ink-soft);
    border-radius: 2px;
    background: transparent;
    flex-shrink: 0;
    position: relative;
    padding: 0;
  }

  li.task.completed .check {
    background: var(--accent);
    border-color: var(--accent);
  }

  li.task.completed .check::after {
    content: "";
    position: absolute;
    left: 3px;
    top: -1px;
    width: 4px;
    height: 8px;
    border: solid var(--paper);
    border-width: 0 2px 2px 0;
    transform: rotate(40deg);
  }

  .task-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .task-text {
    font-size: 1.05rem;
    word-break: break-word;
  }

  li.task.completed .task-text {
    color: var(--accent-strike);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
  }

  .due-date {
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    color: var(--due-soon);
    letter-spacing: 0.03em;
    margin-top: 0.15rem;
  }

  .due-date.overdue { color: var(--danger); }
  li.task.completed .due-date { color: var(--ink-soft); }

  .row-actions {
    display: flex;
    gap: 0.3rem;
    opacity: 0;
    transition: opacity 0.12s ease;
  }

  li.task:hover .row-actions { opacity: 1; }

  .edit-btn,
  .delete-btn {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.2rem 0.3rem;
  }

  .edit-btn:hover { color: var(--accent); }
  .delete-btn:hover { color: var(--danger); }

  li.task.editing {
    align-items: center;
    flex-wrap: wrap;
  }

  .edit-text-input {
    flex: 1;
    min-width: 120px;
    font-family: inherit;
    font-size: 1.05rem;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--ink);
    color: var(--ink);
    padding: 0.2rem 0.1rem;
    outline: none;
  }

  .edit-date-input {
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--ink);
    color: var(--ink);
    padding: 0.2rem 0.1rem;
    outline: none;
  }

  .save-btn,
  .cancel-btn {
    background: transparent;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.2rem 0.35rem;
    color: var(--ink-soft);
  }

  .save-btn:hover { color: var(--accent); }
  .cancel-btn:hover { color: var(--danger); }

  .empty-state {
    padding: 2rem 0.5rem;
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
    font-size: 0.95rem;
  }

  @media (prefers-reduced-motion: reduce) {
    .delete-btn { transition: none; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>Task Ledger</h1>
    <div class="subtitle">entries kept in order &mdash; check off what's done</div>
  </header>

  <form id="add-form">
    <input type="text" id="task-input" placeholder="Add a new entry&hellip;" autocomplete="off">
    <input type="date" id="due-input" aria-label="Due date (optional)">
    <button type="submit">Add</button>
  </form>

  <div class="toolbar">
    <span id="counter"></span>
    <div class="filters" id="filters">
      <button class="filter-btn selected" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>
  </div>

  <ul id="task-list"></ul>
</main>

<script>
  // ---- Data ----
  let tasks = [
    { id: 1, text: "Learn querySelector", completed: true, dueDate: "" },
    { id: 2, text: "Wire up addEventListener", completed: false, dueDate: "" },
    { id: 3, text: "Build the DOM by hand", completed: false, dueDate: "" }
  ];
  let nextId = 4;
  let currentFilter = "all"; // "all" | "active" | "completed"
  let editingId = null;     // id of the task currently in edit mode, or null

  // ---- Element references ----
  const form = document.querySelector("#add-form");
  const input = document.querySelector("#task-input");
  const dueInput = document.querySelector("#due-input");
  const list = document.querySelector("#task-list");
  const counter = document.querySelector("#counter");
  const filterButtons = document.querySelectorAll(".filter-btn");

  // ---- Rendering ----
  function getVisibleTasks() {
    if (currentFilter === "active") return tasks.filter(t => !t.completed);
    if (currentFilter === "completed") return tasks.filter(t => t.completed);
    return tasks;
  }

  function render() {
    // Clear the list without innerHTML string-building
    while (list.firstChild) {
      list.removeChild(list.firstChild);
    }

    const visible = getVisibleTasks();

    if (visible.length === 0) {
      const empty = document.createElement("li");
      empty.className = "empty-state";
      empty.textContent = tasks.length === 0
        ? "No entries yet. Add your first one above."
        : "Nothing to show in this view.";
      list.appendChild(empty);
    } else {
      visible.forEach(task => list.appendChild(buildTaskElement(task)));
    }

    renderCounter();
    renderFilterState();
  }

  function formatDueDate(dateStr) {
    // dateStr is "YYYY-MM-DD"; parse as local date to avoid timezone shift
    const [y, m, d] = dateStr.split("-").map(Number);
    const date = new Date(y, m - 1, d);
    return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  function isOverdue(task) {
    if (!task.dueDate || task.completed) return false;
    const [y, m, d] = task.dueDate.split("-").map(Number);
    const due = new Date(y, m - 1, d);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return due < today;
  }

  function buildTaskElement(task) {
    const li = document.createElement("li");
    li.dataset.id = task.id;

    if (task.id === editingId) {
      return buildEditRow(task, li);
    }

    li.className = "task" + (task.completed ? " completed" : "");

    const checkBtn = document.createElement("button");
    checkBtn.className = "check";
    checkBtn.setAttribute("aria-label", "Toggle complete");
    checkBtn.addEventListener("click", () => toggleTask(task.id));

    const main = document.createElement("div");
    main.className = "task-main";

    const span = document.createElement("span");
    span.className = "task-text";
    span.textContent = task.text;
    main.appendChild(span);

    if (task.dueDate) {
      const due = document.createElement("span");
      due.className = "due-date" + (isOverdue(task) ? " overdue" : "");
      due.textContent = (isOverdue(task) ? "Overdue \u2014 " : "Due ") + formatDueDate(task.dueDate);
      main.appendChild(due);
    }

    const actions = document.createElement("div");
    actions.className = "row-actions";

    const editBtn = document.createElement("button");
    editBtn.className = "edit-btn";
    editBtn.textContent = "Edit";
    editBtn.addEventListener("click", () => startEdit(task.id));

    const delBtn = document.createElement("button");
    delBtn.className = "delete-btn";
    delBtn.textContent = "Delete";
    delBtn.addEventListener("click", () => deleteTask(task.id));

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);

    li.appendChild(checkBtn);
    li.appendChild(main);
    li.appendChild(actions);
    return li;
  }

  function buildEditRow(task, li) {
    li.className = "task editing";

    const textInput = document.createElement("input");
    textInput.type = "text";
    textInput.className = "edit-text-input";
    textInput.value = task.text;

    const dateInput = document.createElement("input");
    dateInput.type = "date";
    dateInput.className = "edit-date-input";
    dateInput.value = task.dueDate || "";

    const saveBtn = document.createElement("button");
    saveBtn.className = "save-btn";
    saveBtn.textContent = "Save";
    saveBtn.addEventListener("click", () => saveEdit(task.id, textInput.value, dateInput.value));

    const cancelBtn = document.createElement("button");
    cancelBtn.className = "cancel-btn";
    cancelBtn.textContent = "Cancel";
    cancelBtn.addEventListener("click", () => cancelEdit());

    textInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") saveEdit(task.id, textInput.value, dateInput.value);
      if (e.key === "Escape") cancelEdit();
    });

    li.appendChild(textInput);
    li.appendChild(dateInput);
    li.appendChild(saveBtn);
    li.appendChild(cancelBtn);
    return li;
  }

  function renderCounter() {
    const remaining = tasks.filter(t => !t.completed).length;
    counter.textContent = "";
    const strong = document.createElement("strong");
    strong.textContent = String(remaining);
    counter.appendChild(strong);
    counter.appendChild(document.createTextNode(
      remaining === 1 ? " task remaining" : " tasks remaining"
    ));
  }

  function renderFilterState() {
    filterButtons.forEach(btn => {
      btn.classList.toggle("selected", btn.dataset.filter === currentFilter);
    });
  }

  // ---- Data mutations ----
  function addTask(text, dueDate) {
    tasks.push({ id: nextId++, text, completed: false, dueDate: dueDate || "" });
    render();
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) task.completed = !task.completed;
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    if (editingId === id) editingId = null;
    render();
  }

  function startEdit(id) {
    editingId = id;
    render();
  }

  function cancelEdit() {
    editingId = null;
    render();
  }

  function saveEdit(id, newText, newDueDate) {
    const trimmed = newText.trim();
    if (trimmed === "") return; // don't allow saving an empty task
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.text = trimmed;
      task.dueDate = newDueDate || "";
    }
    editingId = null;
    render();
  }

  // ---- Event listeners ----
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (text === "") return;
    addTask(text, dueInput.value);
    input.value = "";
    dueInput.value = "";
    input.focus();
  });

  filterButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  // ---- Initial paint ----
  render();
</script>
</body>
</html>
